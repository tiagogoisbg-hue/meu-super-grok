<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grok Particular - Tiago</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #0a0a0a; color: #fff; font-family: system-ui; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .chat { height: 58vh; overflow-y: auto; background: #111; border-radius: 20px; padding: 15px; }
    .message { max-width: 85%; padding: 14px 18px; border-radius: 18px; margin-bottom: 12px; }
    .user { background: #22c55e; color: black; margin-left: auto; }
    .bot { background: #27272a; }
  </style>
</head>
<body class="min-h-screen p-4">
  <div class="max-w-4xl mx-auto">
    <h1 class="text-5xl font-bold text-center mb-2">🚀 Grok Particular 🤖</h1>
    <p class="text-green-400 text-center mb-8">Versão Tiago • 100% sua</p>

    <!-- ABAS -->
    <div class="flex mb-6 border-b border-gray-700">
      <button onclick="showTab(0)" id="btn0" class="flex-1 py-4 font-medium border-b-4 border-green-500">💬 Bate-Papo</button>
      <button onclick="showTab(1)" id="btn1" class="flex-1 py-4 font-medium">🎥 Gerar Vídeo</button>
    </div>

    <!-- BATE-PAPO (IA dentro do app) -->
    <div id="tab0" class="tab-content active">
      <div id="chat" class="chat flex flex-col"></div>
      <div class="mt-4 flex gap-3">
        <input id="input" class="flex-1 bg-zinc-800 p-5 rounded-3xl text-lg outline-none" placeholder="Digite aqui...">
        <button onclick="enviar()" class="bg-green-600 px-10 rounded-3xl font-bold">Enviar</button>
      </div>
    </div>

    <!-- GERAR VÍDEO -->
    <div id="tab1" class="tab-content">
      <h2 class="text-3xl font-bold mb-6">🎥 Gerar Vídeo</h2>
      <textarea id="videoText" class="w-full h-40 bg-zinc-900 p-6 rounded-3xl text-lg" placeholder="Descreva o vídeo..."></textarea>
      <button onclick="gerarVideo()" class="w-full mt-8 bg-gradient-to-r from-purple-600 to-pink-600 py-7 rounded-3xl text-2xl font-bold">
        GERAR VÍDEO AGORA
      </button>
    </div>
  </div>

  <script>
    function showTab(n) {
      document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
      document.getElementById('tab' + n).classList.add('active');
      document.getElementById('btn0').classList.toggle('border-green-500', n === 0);
      document.getElementById('btn1').classList.toggle('border-green-500', n === 1);
    }

    const chat = document.getElementById('chat');
    function addMessage(text, isUser) {
      const div = document.createElement('div');
      div.className = flex ${isUser ? 'justify-end' : 'justify-start'};
      div.innerHTML = <div class="message ${isUser ? 'user' : 'bot'}">${text}</div>;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    function iaResponde(msg) {
      if (msg.toLowerCase().includes('cpf') || msg.toLowerCase().includes('crédito')) return "🤖 Analisando CPF... Me passa o número completo que eu faço a análise detalhada pra você.";
      return "🤖 Entendi Tiago! Me dá mais detalhes que eu te ajudo agora.";
    }

    function enviar() {
      const input = document.getElementById('input');
      const texto = input.value.trim();
      if (!texto) return;
      addMessage(texto, true);
      input.value = '';
      setTimeout(() => addMessage(iaResponde(texto), false), 600);
    }

    function gerarVideo() {
      const texto = document.getElementById('videoText').value.trim();
      if (!texto) return alert('Digite a descrição do vídeo!');
      const prompt = Vídeo de alta qualidade: ${texto}. Estilo cinematográfico, movimento suave, 4K.;
      navigator.clipboard.writeText(prompt);
      alert('✅ Prompt copiado! Abrindo Kling AI agora...');
      window.open('https://kling.ai', '_blank');
    }

    // Início
    addMessage("Olá Tiago! 🤖 Sou sua IA particular. O que vamos fazer hoje? (Digite algo ou use a aba de vídeo)", false);
  </script>
</body>
</html>
