<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grok Particular - Tiago</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #0a0a0a; color: #fff; font-family: system-ui; }
    .chat { height: 65vh; overflow-y: auto; padding: 20px; background: #111; border-radius: 20px; }
    .message { max-width: 85%; padding: 14px 18px; border-radius: 20px; margin-bottom: 12px; line-height: 1.4; }
    .user { background: #22c55e; color: black; align-self: flex-end; }
    .bot { background: #27272a; align-self: flex-start; }
  </style>
</head>
<body class="min-h-screen p-4">
  <div class="max-w-4xl mx-auto">
    <header class="text-center mb-6">
      <h1 class="text-5xl font-bold flex items-center justify-center gap-3">🚀 Grok Particular <span class="text-4xl">🤖</span></h1>
      <p class="text-green-400">Versão Tiago • 100% sua • Sem vínculo com nada</p>
    </header>

    <div id="chat" class="chat flex flex-col"></div>

    <div class="mt-4 flex gap-3">
      <input id="input" type="text" class="flex-1 bg-zinc-800 p-5 rounded-3xl text-lg outline-none" placeholder="Digite aqui... (ex: Analise CPF 12345678900)">
      <button id="sendBtn" class="bg-green-600 px-10 rounded-3xl font-bold text-lg">Enviar</button>
    </div>
  </div>

  <script>
    const chat = document.getElementById('chat');
    const input = document.getElementById('input');
    const sendBtn = document.getElementById('sendBtn');

    function addMessage(text, isUser) {
      const div = document.createElement('div');
      div.className = flex ${isUser ? 'justify-end' : 'justify-start'};
      div.innerHTML = <div class="message ${isUser ? 'user' : 'bot'}">${text}</div>;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    function iaResponde(msg) {
      const lower = msg.toLowerCase();
      if (lower.includes('cpf') || lower.includes('restrição') || lower.includes('crédito')) {
        return "🤖 <b>Análise de CPF ativada:</b><br>Status: ⚠️ Possível restrição<br>Risco: Médio-Alto<br>Recomendação: Exigir comprovante ou consulta oficial autorizada.<br><br>Quer relatório completo sem filtro?";
      }
      if (lower.includes('oi') || lower.includes('olá')) return "E aí Tiago! 🤖 Pronto pra trabalhar? Me fala o CPF ou o que precisa analisar.";
      return "🤖 Entendi. Como seu analista particular, vou direto: " + msg + "<br><br>Quer que eu aprofunde ou gere o próximo passo?";
    }

    function enviar() {
      const texto = input.value.trim();
      if (!texto) return;
      addMessage(texto, true);
      input.value = '';
      setTimeout(() => addMessage(iaResponde(texto), false), 500);
    }

    // Mensagem inicial do robô
    addMessage("Olá Tiago! 🤖 Sou o Grok Particular — sua IA 100% offline e só sua.<br><br>Digite algo como:<br>• Analise CPF 12345678900<br>• Como está meu cliente X?<br><br>Estou pronto!", false);

    sendBtn.addEventListener('click', enviar);
    input.addEventListener('keypress', e => { if (e.key === 'Enter') enviar(); });
  </script>
</body>
</html>
