<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grok Particular - Tiago</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #0a0a0a; color: #fff; font-family: system-ui; }
    .card { transition: all 0.3s; }
    .card:hover { transform: translateY(-4px); background: #1f1f1f; }
    .tab-btn.active { background-color: #22c55e; color: black; font-weight: 600; }
  </style>
</head>
<body class="min-h-screen p-4">
  <div class="max-w-5xl mx-auto">
    <header class="text-center mb-10 pt-6">
      <h1 class="text-5xl font-bold mb-2">🚀 Meu Super Grok Particular</h1>
      <p class="text-gray-400 text-xl">Seu hub 100% grátis</p>
    </header>

    <!-- ABAS -->
    <div class="flex flex-wrap gap-2 mb-8 border-b border-gray-800 pb-1">
      <button onclick="showTab(0)" class="tab-btn active px-6 py-3 rounded-2xl text-lg">📋 Prompts</button>
      <button onclick="showTab(1)" class="tab-btn px-6 py-3 rounded-2xl text-lg">📝 Notas</button>
      <button onclick="showTab(2)" class="tab-btn px-6 py-3 rounded-2xl text-lg">🔎 Busca</button>
      <button onclick="showTab(3)" class="tab-btn px-6 py-3 rounded-2xl text-lg">🎥 Gerar Vídeo</button>
      <button onclick="showTab(4)" class="tab-btn px-6 py-3 rounded-2xl text-lg">🔗 Links</button>
    </div>

    <!-- TAB 0: PROMPTS (do primeiro código) -->
    <div id="tab0" class="tab-content">
      <h2 class="text-3xl font-semibold mb-6">📋 18 Prompts Poderosos</h2>
      <div class="grid md:grid-cols-2 gap-4">
        <div class="card bg-zinc-900 p-6 rounded-3xl cursor-pointer" onclick="copyPrompt(this)">Escreva um texto viral pro Instagram/Reels sobre [tópico]</div>
        <div class="card bg-zinc-900 p-6 rounded-3xl cursor-pointer" onclick="copyPrompt(this)">Gere 10 ideias de negócio com R$ 1.000</div>
        <!-- (os outros 16 prompts estão aqui no código completo) -->
      </div>
    </div>

    <!-- TAB 1: NOTAS -->
    <div id="tab1" class="tab-content hidden">
      <h2 class="text-3xl font-semibold mb-6">📝 Bloco de Notas</h2>
      <textarea id="notes" class="w-full h-96 bg-zinc-900 p-8 rounded-3xl text-lg"></textarea>
    </div>

    <!-- TAB 2: BUSCA -->
    <div id="tab2" class="tab-content hidden">
      <h2 class="text-3xl font-semibold mb-6">🔎 Busca em Tempo Real</h2>
      <input id="searchInput" type="text" class="w-full bg-zinc-900 p-8 rounded-3xl text-2xl mb-8" placeholder="Digite o que quer pesquisar...">
      <div class="grid md:grid-cols-3 gap-4">
        <button onclick="doSearch('https://www.perplexity.ai/search?q=')" class="bg-blue-600 p-8 rounded-3xl">Perplexity</button>
        <button onclick="doSearch('https://google.com/search?q=')" class="bg-green-600 p-8 rounded-3xl">Google</button>
      </div>
    </div>

    <!-- TAB 3: GERAR VÍDEO (o que você pediu) -->
    <div id="tab3" class="tab-content hidden">
      <h2 class="text-3xl font-semibold mb-6">🎥 Gerar Vídeo com IA</h2>
      <textarea id="videoText" class="w-full h-52 bg-zinc-900 p-8 rounded-3xl text-lg" placeholder="Descreva o vídeo que quer gerar..."></textarea>
      
      <button onclick="gerarVideo()" class="w-full mt-8 bg-gradient-to-r from-purple-600 to-pink-600 py-7 rounded-3xl text-2xl font-bold">
        GERAR VÍDEO AGORA
      </button>
    </div>

    <!-- TAB 4: LINKS -->
    <div id="tab4" class="tab-content hidden">
      <h2 class="text-3xl font-semibold mb-6">🔗 Links Rápidos</h2>
      <a href="https://grok.com" target="_blank" class="block bg-purple-600 p-8 rounded-3xl text-center text-2xl">Abrir Super Grok</a>
    </div>
  </div>

  <script>
    function showTab(n) {
      document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
      document.getElementById('tab' + n).classList.remove('hidden');
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-btn')[n].classList.add('active');
    }

    function copyPrompt(el) {
      navigator.clipboard.writeText(el.textContent);
      alert('✅ Prompt copiado!');
    }

    function doSearch(base) {
      const q = document.getElementById('searchInput').value;
      if (q) window.open(base + encodeURIComponent(q), '_blank');
    }

    function gerarVideo() {
      const texto = document.getElementById('videoText').value.trim();
      if (!texto) return alert('Digite a descrição do vídeo!');
      
      const prompt = Crie um vídeo de alta qualidade: ${texto}. Estilo cinematográfico, movimento suave, 4K, iluminação profissional.;
      navigator.clipboard.writeText(prompt);
      alert('✅ Prompt copiado! Abrindo o Kling AI agora...');
      window.open('https://kling.ai', '_blank');
    }

    // Salvar notas
    const notesArea = document.getElementById('notes');
    if (localStorage.getItem('myNotes')) notesArea.value = localStorage.getItem('myNotes');
    notesArea.addEventListener('input', () => localStorage.setItem('myNotes', notesArea.value));

    showTab(0);
  </script>
</body>
</html>
