<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grok Particular - Versão Tiago</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #0a0a0a; color: #fff; font-family: system-ui; }
    .chat { height: 70vh; overflow-y: auto; }
    .message { max-width: 80%; }
  </style>
</head>
<body class="min-h-screen p-4">
  <div class="max-w-4xl mx-auto">
    <header class="text-center mb-6">
      <h1 class="text-5xl font-bold">🚀 Grok Particular</h1>
      <p class="text-green-400">Versão Tiago • 100% sua • Sem vínculo com nada</p>
    </header>

    <div class="bg-zinc-900 rounded-3xl p-6 chat" id="chat"></div>

    <div class="mt-4 flex gap-3">
      <input id="input" type="text" class="flex-1 bg-zinc-800 p-5 rounded-3xl text-lg outline-none" placeholder="Digite sua mensagem...">
      <button onclick="enviar()" class="bg-green-600 px-10 rounded-3xl font-bold">Enviar</button>
    </div>
  </div>

  <script>
    const chat = document.getElementById('chat');
    const input = document.getElementById('input');

    function addMessage(text, isUser) {
      const div = document.createElement('div');
      div.className = flex ${isUser ? 'justify-end' : 'justify-start'} mb-4;
      div.innerHTML = `
        <div class="message ${isUser ? 'bg-green-600' : 'bg-zinc-800'} p-5 rounded-3xl">
          ${text}
        </div>
      `;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    function iaResponde(msg) {
      const lower = msg.toLowerCase();
      
      if (lower.includes('cpf') || lower.includes('restrição') || lower.includes('crédito')) {
        return "Analisando o CPF... (simule aqui o que quiser). Quer que eu crie um prompt completo pra análise técnica sem filtro?";
      }
      if (lower.includes('olá') || lower.includes('oi')) return "E aí Tiago! Pronto pra trabalhar? 😎";
      if (lower.includes('como você está')) return "Melhor que nunca, porque sou feito só pra você!";
      if (lower.includes('cliente') || lower.includes('análise')) return "Me passa o nome e CPF que eu monto a análise completa pra você agora mesmo.";
      
      // Respostas aleatórias inteligentes
      const respostas = [
        "Entendi. Me dá mais detalhes que eu te entrego a melhor solução possível.",
        "Boa pergunta! Vou pensar como um analista de crédito experiente...",
        "Perfeito, Tiago. Aqui vai a resposta direta e sem enrolação:",
        "Já fiz isso mil vezes na vida real. Quer o passo a passo?",
        "Modo trabalho ativado. Vamos resolver isso agora."
      ];
      return respostas[Math.floor(Math.random() * respostas.length)] + " " + msg;
    }

    function enviar() {
      const texto = input.value.trim();
      if (!texto) return;
      addMessage(texto, true);
      input.value = '';

      // Simula digitação
      setTimeout(() => {
        const resposta = iaResponde(texto);
        addMessage(resposta, false);
      }, 800);
    }

    // Mensagem inicial
    addMessage("Olá Tiago! Sou o Grok Particular — sua IA 100% offline e sem vínculo com ninguém. O que vamos trabalhar hoje?", false);

    // Enter para enviar
    input.addEventListener('keypress', e => { if (e.key === 'Enter') enviar(); });
  </script>
</body>
</html>
